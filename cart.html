<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — NeuGlow</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--cream); }
    .cart-page { max-width: 1100px; margin: 0 auto; padding: 100px 24px 80px; display: grid; grid-template-columns: 1fr 360px; gap: 48px; align-items: start; }
    .cart-section h2 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 6px; }
    .cart-count { color: var(--warm-gray); font-size: 14px; margin-bottom: 32px; }
    .cart-item {
      display: flex; gap: 20px; padding: 22px 0;
      border-bottom: 1px solid var(--border); align-items: flex-start;
    }
    .cart-item-img {
      width: 90px; height: 90px; flex-shrink: 0;
      border-radius: var(--r-md); background: var(--cream-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; overflow: hidden;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
    .cart-item-price { color: var(--warm-gray); font-size: 14px; }
    .qty-control { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: var(--transition); }
    .qty-btn:hover { border-color: var(--orange); color: var(--orange); }
    .qty-num { font-weight: 600; min-width: 24px; text-align: center; }
    .cart-item-total { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; }
    .remove-btn { color: #BCA98A; font-size: 13px; cursor: pointer; margin-top: 8px; border: none; background: none; transition: var(--transition); }
    .remove-btn:hover { color: var(--orange); }
    .empty-cart { text-align: center; padding: 80px 0; }
    .empty-cart .ico { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-cart h3 { color: var(--warm-gray); font-weight: 400; }
    /* Summary */
    .order-summary {
      background: white; border-radius: var(--r-lg);
      border: 1px solid var(--border); padding: 28px;
      position: sticky; top: 90px;
    }
    .order-summary h3 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 22px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 14px; }
    .summary-row.total { font-weight: 700; font-size: 1.1rem; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 6px; }
    .trust-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
    .trust-badge { font-size: 11px; color: var(--warm-gray); display: flex; align-items: center; gap: 4px; }
    @media (max-width: 800px) { .cart-page { grid-template-columns: 1fr; } .order-summary { position: static; } }
  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="navbar-inner">
    <a href="/" class="nav-logo">Neu<span>Glow</span></a>
    <ul class="nav-links">
      <li><a href="/#products">Shop</a></li>
      <li><a href="/#science">Science</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="window.location='account.html'">👤</button>
      <button class="nav-icon-btn" onclick="window.location='cart.html'">
        🛒 <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="cart-page">
  <div class="cart-section">
    <h2>Your Cart</h2>
    <p class="cart-count" id="cart-count"></p>
    <div id="cart-items"></div>
  </div>
  <div>
    <div class="order-summary">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="sum-sub">$0.00</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row"><span>Tax (8%)</span><span id="sum-tax">$0.00</span></div>
      <div class="summary-row total"><span>Total</span><span id="sum-total">$0.00</span></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="goCheckout()" id="checkout-btn" style="margin-top:20px">
        Proceed to Checkout
      </button>
      <a href="/#products" class="btn btn-secondary btn-full" style="margin-top:10px;justify-content:center">Continue Shopping</a>
      <div class="trust-badges">
        <span class="trust-badge">🔒 Secure checkout</span>
        <span class="trust-badge">↩️ 30-day returns</span>
        <span class="trust-badge">🚚 Free shipping</span>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
  function renderCart() {
    const items = Cart.get();
    const count = document.getElementById('cart-count');
    const container = document.getElementById('cart-items');
    const checkoutBtn = document.getElementById('checkout-btn');

    if (!items.length) {
      count.textContent = '0 items';
      checkoutBtn.disabled = true;
      container.innerHTML = `
        <div class="empty-cart">
          <div class="ico">🛒</div>
          <h3>Your cart is empty</h3>
          <a href="/#products" class="btn btn-primary" style="margin-top:20px">Shop Now</a>
        </div>`;
      updateSummary(0);
      return;
    }

    count.textContent = `${Cart.count()} item${Cart.count() !== 1 ? 's' : ''}`;
    checkoutBtn.disabled = false;

    container.innerHTML = items.map(item => `
      <div class="cart-item" id="ci-${item._id}">
        <div class="cart-item-img">
          ${item.images?.[0] ? `<img src="${item.images[0]}" alt="${item.name}">` : (item.icon || '💡')}
        </div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${item.price} each</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty('${item._id}', ${item.qty - 1})">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty('${item._id}', ${item.qty + 1})">+</button>
          </div>
          <button class="remove-btn" onclick="removeItem('${item._id}')">Remove</button>
        </div>
        <div class="cart-item-total">$${(item.price * item.qty).toFixed(2)}</div>
      </div>
    `).join('');

    updateSummary(Cart.total());
  }

  function updateSummary(sub) {
    const tax = sub * 0.08;
    document.getElementById('sum-sub').textContent   = `$${sub.toFixed(2)}`;
    document.getElementById('sum-tax').textContent   = `$${tax.toFixed(2)}`;
    document.getElementById('sum-total').textContent = `$${(sub + tax).toFixed(2)}`;
  }

  function changeQty(id, qty) { Cart.updateQty(id, qty); renderCart(); }
  function removeItem(id)     { Cart.remove(id); renderCart(); showToast('Item removed', 'default'); }

  function goCheckout() {
    const user = API.getUser();
    if (!user) {
      showToast('Please log in to checkout', 'error');
      setTimeout(() => window.location = 'account.html', 1200);
      return;
    }
    window.location = 'checkout.html';
  }

  renderCart();
</script>
</body>
</html>
