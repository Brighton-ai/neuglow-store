<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — NeuGlow</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--cream); }
    .account-page { max-width: 900px; margin: 0 auto; padding: 100px 24px 80px; }
    .auth-card { background: white; border-radius: var(--r-lg); border: 1px solid var(--border); max-width: 440px; margin: 0 auto; overflow: hidden; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .auth-tab { flex: 1; padding: 18px; text-align: center; font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--warm-gray); cursor: pointer; transition: var(--transition); }
    .auth-tab.active { color: var(--orange); box-shadow: inset 0 -2px 0 var(--orange); }
    .auth-body { padding: 28px; }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .dashboard { display: none; }
    .dashboard.visible { display: block; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; flex-wrap: wrap; gap: 16px; }
    .dash-header h2 { font-family: var(--font-display); margin: 0; }
    .orders-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); }
    .orders-table th { background: var(--cream-dark); text-align: left; padding: 14px 18px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warm-gray); }
    .orders-table td { padding: 16px 18px; border-top: 1px solid var(--border); font-size: 14px; vertical-align: top; }
    .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .status-paid      { background: #D1FAE5; color: #065F46; }
    .status-pending   { background: #FEF3C7; color: #92400E; }
    .status-processing{ background: #DBEAFE; color: #1E40AF; }
    .status-shipped   { background: #DBEAFE; color: #1E40AF; }
    .status-delivered { background: #D1FAE5; color: #065F46; }
    .status-cancelled { background: #FEE2E2; color: #991B1B; }
    .status-refunded  { background: #F3F4F6; color: #6B7280; }
    .tracking-badge { display: inline-block; margin-top: 6px; font-size: 11px; color: var(--orange); background: rgba(232,82,10,0.08); border: 1px solid rgba(232,82,10,0.2); padding: 2px 10px; border-radius: 20px; }
    .empty-orders { text-align: center; padding: 60px; color: var(--warm-gray); }
    .items-list { font-size: 13px; color: var(--warm-gray); margin-top: 4px; }
    @media (max-width: 600px) {
      .orders-table thead { display: none; }
      .orders-table tr { display: block; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; }
      .orders-table td { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding: 10px 14px; }
      .orders-table td:first-child { border-top: none; }
    }
  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo">Neu<span>Glow</span></a>
    <ul class="nav-links">
      <li><a href="index.html#products">Shop</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn" onclick="window.location='cart.html'">🛒
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
  </div>
</nav>

<div class="account-page">

  <!-- Auth (logged out) -->
  <div id="auth-section">
    <div style="text-align:center;margin-bottom:32px">
      <span class="section-label">Account</span>
      <h2 style="font-family:var(--font-display)">Welcome Back</h2>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" onclick="switchTab('register')">Create Account</div>
      </div>
      <div class="auth-body">
        <div class="auth-panel active" id="tab-login">
          <div class="form-group"><label>Email</label><input class="form-control" id="li-email" type="email" placeholder="you@email.com"></div>
          <div class="form-group"><label>Password</label><input class="form-control" id="li-pass" type="password" placeholder="••••••••"></div>
          <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()" id="li-btn">Sign In</button>
        </div>
        <div class="auth-panel" id="tab-register">
          <div class="form-group"><label>Full Name</label><input class="form-control" id="re-name" placeholder="Jane Smith"></div>
          <div class="form-group"><label>Email</label><input class="form-control" id="re-email" type="email" placeholder="you@email.com"></div>
          <div class="form-group"><label>Password</label><input class="form-control" id="re-pass" type="password" placeholder="Min 6 characters"></div>
          <button class="btn btn-primary btn-full btn-lg" onclick="doRegister()" id="re-btn">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard (logged in) -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div>
        <span class="section-label">My Account</span>
        <h2 id="dash-name">Hello!</h2>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="admin.html" id="admin-link" class="btn btn-secondary btn-sm" style="display:none">⚙️ Admin Panel</a>
        <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
      </div>
    </div>

    <h3 style="font-family:var(--font-display);margin-bottom:20px">My Orders</h3>
    <div id="orders-section">
      <div style="text-align:center;padding:40px;color:var(--warm-gray)">Loading orders…</div>
    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
  // Cart badge
  document.getElementById('cart-badge').textContent = Cart.count() || 0;

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  async function doLogin() {
    const btn = document.getElementById('li-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const { token, user } = await API.auth.login(
        document.getElementById('li-email').value,
        document.getElementById('li-pass').value
      );
      localStorage.setItem('ng_token', token);
      localStorage.setItem('ng_user', JSON.stringify(user));
      showToast('Welcome back!', 'success');
      showDashboard(user);
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  async function doRegister() {
    const btn = document.getElementById('re-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const { token, user } = await API.auth.register(
        document.getElementById('re-name').value,
        document.getElementById('re-email').value,
        document.getElementById('re-pass').value
      );
      localStorage.setItem('ng_token', token);
      localStorage.setItem('ng_user', JSON.stringify(user));
      showToast('Account created! Welcome to NeuGlow 🧠', 'success');
      showDashboard(user);
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  function doLogout() {
    API.auth.logout();
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('auth-section').style.display = '';
    showToast('Signed out');
  }

  function showDashboard(user) {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    document.getElementById('dash-name').textContent = `Hello, ${user.name.split(' ')[0]} 👋`;
    if (user.role === 'admin') document.getElementById('admin-link').style.display = '';
    loadOrders();
  }

  async function loadOrders() {
    const sec = document.getElementById('orders-section');
    try {
      const orders = await API.orders.mine();
      if (!orders.length) {
        sec.innerHTML = `
          <div class="empty-orders">
            <div style="font-size:3rem;margin-bottom:16px">🛒</div>
            <p>No orders yet.</p>
            <a href="index.html#products" class="btn btn-primary" style="margin-top:12px">Shop Now →</a>
          </div>`;
        return;
      }

      const pillClass = s => `status-pill status-${s}`;

      sec.innerHTML = `
        <table class="orders-table">
          <thead><tr>
            <th>Order #</th>
            <th>Date</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
          </tr></thead>
          <tbody>
            ${orders.map(o => `
              <tr>
                <td><strong>${o.orderNumber}</strong></td>
                <td style="white-space:nowrap">${new Date(o.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}</td>
                <td>
                  <div>${o.items.map(i => `${i.name} ×${i.qty}`).join('<br>')}</div>
                </td>
                <td><strong>$${o.total?.toFixed(2)}</strong></td>
                <td>
                  <span class="${pillClass(o.status)}">${o.status}</span>
                  ${o.trackingNumber ? `<div class="tracking-badge">📦 ${o.trackingNumber}</div>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    } catch (e) {
      sec.innerHTML = `<div class="empty-orders">Could not load orders. Please try again.</div>`;
    }
  }

  // Auto-show dashboard if already logged in
  const user = API.getUser();
  if (user) showDashboard(user);
</script>
</body>
</html>
